openapi: 3.0.3
info:
  title: SPM API
  version: 1.0.0
  description: Senior Project Management system API

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    StaffUserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mail:
          type: string
        role:
          type: string
          enum: [Admin, Coordinator, Professor]
        firstLogin:
          type: boolean

    StudentUserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        githubUsername:
          type: string
        role:
          type: string
          enum: [Student]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        userInfo:
          $ref: '#/components/schemas/StaffUserInfo'

    GithubLoginResponse:
      type: object
      properties:
        token:
          type: string
        userInfo:
          $ref: '#/components/schemas/StudentUserInfo'

    Sprint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        storyPointTarget:
          type: integer
          minimum: 1

    Deliverable:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [Proposal, SoW, Demonstration]
        submissionDeadline:
          type: string
          format: date-time
        reviewDeadline:
          type: string
          format: date-time
        weight:
          type: number

    Criterion:
      type: object
      required:
        - criterionName
        - gradingType
        - weight
      properties:
        criterionName:
          type: string
        gradingType:
          type: string
          enum: [Binary, Soft]
        weight:
          type: number

    CommitteeSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        committeeName:
          type: string
        termId:
          type: string
          format: uuid

    ProfessorAssignment:
      type: object
      required:
        - professorId
        - role
      properties:
        professorId:
          type: string
          format: uuid
        role:
          type: string
          enum: [ADVISOR, JURY]

    CommitteeDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        committeeName:
          type: string
        termId:
          type: string
          format: uuid
        professors:
          type: array
          items:
            $ref: '#/components/schemas/ProfessorAssignment'
        groupIds:
          type: array
          items:
            type: string
            format: uuid

    ProfessorCommitteeSummary:
      type: object
      properties:
        committeeId:
          type: string
          format: uuid
        committeeName:
          type: string
        role:
          type: string
          enum: [ADVISOR, JURY]
        groupIds:
          type: array
          items:
            type: string
            format: uuid

security:
  - bearerAuth: []

paths:

  /auth/login:
    post:
      summary: Login for professors, coordinators, and admins
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mail, password]
              properties:
                mail:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /auth/github:
    post:
      summary: Validate GitHub OAuth payload and issue JWT for students
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, studentId]
              properties:
                code:
                  type: string
                studentId:
                  type: string
                  pattern: '^[0-9]{11}$'
      responses:
        '200':
          description: Student validated, JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubLoginResponse'
        '400':
          description: Missing or malformed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Student ID not recognized or not on approved list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                message: "Student ID not recognized"

  /auth/reset-password:
    get:
      summary: Validate a one-time password reset token
      security: []
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
        '400':
          description: Token invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    post:
      summary: Redeem a reset token and set a new password
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password updated successfully
        '400':
          description: Token invalid/expired or password fails validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /admin/register-professor:
    post:
      summary: Register a new professor and return the reset token for initial password setup
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mail]
              properties:
                mail:
                  type: string
      responses:
        '201':
          description: Professor created
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetToken:
                    type: string
        '403':
          description: Caller is not an Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: Professor with same mail already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Server error during professor creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/students/upload:
    post:
      summary: Upload the list of eligible student IDs for the active term
      tags: [Coordinator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentIds]
              properties:
                studentIds:
                  type: array
                  items:
                    type: string
                    pattern: '^[0-9]{11}$'
      responses:
        '201':
          description: Students imported
        '400':
          description: Invalid studentId format, empty list, already uploaded id or duplicate IDs in the list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/sprints:
    post:
      summary: Create a new sprint
      tags: [Coordinator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startDate, endDate]
              properties:
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Sprint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sprint'
        '400':
          description: endDate is before startDate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/sprints/{id}/target:
    patch:
      summary: Set the per-student story point target for a sprint
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [storyPointTarget]
              properties:
                storyPointTarget:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Target updated
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/sprints/{id}/deliverable-mapping:
    post:
      summary: Map a sprint to a deliverable with a contribution percentage
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deliverableId, contributionPercentage]
              properties:
                deliverableId:
                  type: string
                  format: uuid
                contributionPercentage:
                  type: number
                  minimum: 0
                  maximum: 100
      responses:
        '201':
          description: Mapping created
        '400':
          description: Total contribution percentages for this deliverable exceed 100%
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/deliverables:
    post:
      summary: Create a new project deliverable
      tags: [Coordinator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, submissionDeadline, reviewDeadline]
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [Proposal, SoW, Demonstration]
                submissionDeadline:
                  type: string
                  format: date-time
                reviewDeadline:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Deliverable created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deliverable'
        '400':
          description: Review deadline is before the submission deadline, or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/deliverables/{id}:
    patch:
      summary: Update the details or deadlines of an existing deliverable
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [Proposal, SoW, Demonstration]
                submissionDeadline:
                  type: string
                  format: date-time
                reviewDeadline:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Deliverable updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deliverable'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Deliverable not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/deliverables/{id}/weight:
    patch:
      summary: Set the final grade weight percentage for a deliverable
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [weight]
              properties:
                weight:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
      responses:
        '200':
          description: Weight updated
        '400':
          description: >
            weight is not a positive number, or the new value would
            cause total assigned weight across all deliverables to exceed 100%.
            E.g. "Total deliverable weight cannot exceed 100% or be lower than 0%. Currently assigned: X%."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Deliverable not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/deliverables/{id}/rubric:
    get:
      summary: Get the rubric criteria for a deliverable
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rubric criteria returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Criterion'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Deliverable not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    post:
      summary: Replace the evaluation rubric criteria for a deliverable
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [criteria]
              properties:
                criteria:
                  type: array
                  items:
                    $ref: '#/components/schemas/Criterion'
      responses:
        '200':
          description: Rubric criteria updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Criterion'
        '400':
          description: Invalid criteria (e.g. empty list, weights don't sum to 100, invalid gradingType)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Deliverable not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/publish:
    post:
      summary: Finalize configuration and activate the system for students
      tags: [Coordinator]
      responses:
        '200':
          description: System activated
        '400':
          description: Configuration is incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees:
    post:
      summary: Create a new committee for a specific term
      tags: [Committees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [committeeName, termId]
              properties:
                committeeName:
                  type: string
                termId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Committee created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: A committee with the same name already exists for this term
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    get:
      summary: List all committees, optionally filtered by term
      tags: [Committees]
      parameters:
        - name: termId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of committees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommitteeSummary'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}:
    get:
      summary: Get full details of a committee including professors and groups
      tags: [Committees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Committee detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitteeDetail'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}/professors:
    post:
      summary: Assign professors with ADVISOR or JURY roles to a committee
      tags: [Committees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [professors]
              properties:
                professors:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProfessorAssignment'
      responses:
        '200':
          description: Professors assigned
        '400':
          description: >
            Invalid professor IDs, scheduling conflict, or constraint violation
            (e.g. zero or multiple primary ADVISORs submitted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}/groups:
    post:
      summary: Batch-assign student groups to a committee
      tags: [Committees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupIds]
              properties:
                groupIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Groups assigned; each group is now eligible for Proposal submission
        '400':
          description: >
            A group has not completed Advisor Association (Process 3), is already
            assigned to another committee, or a group ID is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /professors/me/committees:
    get:
      summary: Get committees assigned to the authenticated professor
      tags: [Professors]
      responses:
        '200':
          description: List of committees the professor belongs to, with assigned groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfessorCommitteeSummary'
        '403':
          description: Caller is not a Professor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'