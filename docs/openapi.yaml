openapi: 3.0.3
info:
  title: SPM API
  version: 1.0.0
  description: Senior Project Management system API

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    StaffUserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mail:
          type: string
        role:
          type: string
          enum: [Admin, Coordinator, Professor]
        firstLogin:
          type: boolean

    StudentUserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        githubUsername:
          type: string
        role:
          type: string
          enum: [Student]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        userInfo:
          $ref: '#/components/schemas/StaffUserInfo'

    GithubLoginResponse:
      type: object
      properties:
        token:
          type: string
        userInfo:
          $ref: '#/components/schemas/StudentUserInfo'

    Sprint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        storyPointTarget:
          type: integer
          minimum: 1

    Deliverable:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [Proposal, SoW, Demonstration]
        submissionDeadline:
          type: string
          format: date-time
        reviewDeadline:
          type: string
          format: date-time
        weight:
          type: number

    Criterion:
      type: object
      required:
        - criterionName
        - gradingType
        - weight
      properties:
        criterionName:
          type: string
        gradingType:
          type: string
          enum: [Binary, Soft]
        weight:
          type: number

    # ── P4 — Blue Team ────────────────────────────────────────────────────────
    CommitteeSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        committeeName:
          type: string
        termId:
          type: string
          format: uuid

    ProfessorAssignment:
      type: object
      required:
        - professorId
        - role
      properties:
        professorId:
          type: string
          format: uuid
        role:
          type: string
          enum: [ADVISOR, JURY]

    CommitteeDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        committeeName:
          type: string
        termId:
          type: string
          format: uuid
        professors:
          type: array
          items:
            $ref: '#/components/schemas/ProfessorAssignment'
        groupIds:
          type: array
          items:
            type: string
            format: uuid

    ProfessorCommitteeSummary:
      type: object
      properties:
        committeeId:
          type: string
          format: uuid
        committeeName:
          type: string
        role:
          type: string
          enum: [ADVISOR, JURY]
        groupIds:
          type: array
          items:
            type: string
            format: uuid

    # ── P2 — Red Team ─────────────────────────────────────────────────────────
    GroupMember:
      type: object
      properties:
        studentId:
          type: string
        role:
          type: string
          enum: [TEAM_LEADER, MEMBER]
        joinedAt:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object
      required: [groupName]
      properties:
        groupName:
          type: string

    CreateGroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupName:
          type: string
        termId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: '#/components/schemas/GroupMember'

    GroupDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupName:
          type: string
        termId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        jiraSpaceUrl:
          type: string
          nullable: true
        jiraProjectKey:
          type: string
          nullable: true
        jiraBound:
          type: boolean
        githubOrgName:
          type: string
          nullable: true
        githubBound:
          type: boolean
        advisorId:
          type: string
          format: uuid
          nullable: true
        members:
          type: array
          items:
            $ref: '#/components/schemas/GroupMember'

    StudentSearchResponse:
      type: object
      properties:
        studentId:
          type: string
        githubUsername:
          type: string
          nullable: true
        inGroup:
          type: boolean

    SendInvitationRequest:
      type: object
      required: [targetStudentId]
      properties:
        targetStudentId:
          type: string

    InvitationResponse:
      type: object
      properties:
        invitationId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        targetStudentId:
          type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, DECLINED, AUTO_DENIED, CANCELLED]
        sentAt:
          type: string
          format: date-time

    PendingInvitationResponse:
      type: object
      properties:
        invitationId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        teamLeaderStudentId:
          type: string
        sentAt:
          type: string
          format: date-time

    RespondInvitationRequest:
      type: object
      required: [accept]
      properties:
        accept:
          type: boolean

    DeclineInvitationResponse:
      type: object
      properties:
        invitationId:
          type: string
          format: uuid
        status:
          type: string

    BindJiraRequest:
      type: object
      required: [jiraSpaceUrl, jiraEmail, jiraProjectKey, jiraApiToken]
      properties:
        jiraSpaceUrl:
          type: string
        jiraEmail:
          type: string
        jiraProjectKey:
          type: string
        jiraApiToken:
          type: string

    BindJiraResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        status:
          type: string
        jiraSpaceUrl:
          type: string
        jiraProjectKey:
          type: string
        jiraBound:
          type: boolean

    BindGithubRequest:
      type: object
      required: [githubOrgName, githubPat]
      properties:
        githubOrgName:
          type: string
        githubPat:
          type: string

    BindGithubResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        status:
          type: string
        githubOrgName:
          type: string
        githubBound:
          type: boolean

    CoordinatorGroupSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupName:
          type: string
        termId:
          type: string
        status:
          type: string
        memberCount:
          type: integer
        jiraBound:
          type: boolean
        githubBound:
          type: boolean

    CoordinatorMemberActionRequest:
      type: object
      required: [studentId, action]
      properties:
        studentId:
          type: string
        action:
          type: string
          enum: [ADD, REMOVE]

    CoordinatorDisbandResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        status:
          type: string

    # ── P3 — Red Team ─────────────────────────────────────────────────────────
    AdvisorSummary:
      type: object
      properties:
        advisorId:
          type: string
          format: uuid
        name:
          type: string
        mail:
          type: string
        currentGroupCount:
          type: integer
        capacity:
          type: integer

    CoordinatorAdvisorSummary:
      type: object
      properties:
        advisorId:
          type: string
          format: uuid
        name:
          type: string
        mail:
          type: string
        currentGroupCount:
          type: integer
        capacity:
          type: integer
        atCapacity:
          type: boolean

    AdvisorRequestPayload:
      type: object
      required: [advisorId]
      properties:
        advisorId:
          type: string
          format: uuid

    AdvisorRequestCreatedResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        advisorId:
          type: string
          format: uuid
        status:
          type: string
        sentAt:
          type: string
          format: date-time

    AdvisorRequestDetailStudent:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        advisorId:
          type: string
          format: uuid
        advisorName:
          type: string
        status:
          type: string
        sentAt:
          type: string
          format: date-time
        respondedAt:
          type: string
          format: date-time
          nullable: true

    AdvisorRequestCancelResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        status:
          type: string

    AdvisorRequestSummaryProfessor:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        termId:
          type: string
        memberCount:
          type: integer
        sentAt:
          type: string
          format: date-time

    AdvisorRequestDetailProfessor:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        group:
          $ref: '#/components/schemas/GroupDetailResponse'
        sentAt:
          type: string
          format: date-time

    RespondAdvisorRequestPayload:
      type: object
      required: [accept]
      properties:
        accept:
          type: boolean

    RespondAdvisorRequestAcceptResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        status:
          type: string
        groupId:
          type: string
          format: uuid
        groupStatus:
          type: string

    RespondAdvisorRequestRejectResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        status:
          type: string

    SprintRefreshResponse:
      type: object
      properties:
        sprintId:
          type: string
          format: uuid
        groupsProcessed:
          type: integer
        issuesFetched:
          type: integer
        aiValidationsRun:
          type: integer
        triggeredAt:
          type: string
          format: date-time

    SprintOverviewResponse:
      type: object
      properties:
        sprintId:
          type: string
          format: uuid
        groups:
          type: array
          items:
            $ref: '#/components/schemas/SprintGroupOverview'

    SprintGroupOverview:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        advisorEmail:
          type: string
          nullable: true
          description: Omitted from JSON when null (TOOLS_BOUND groups with no advisor).
        totalIssues:
          type: integer
        mergedPRs:
          type: integer
        aiPassCount:
          type: integer
        aiWarnCount:
          type: integer
        aiFailCount:
          type: integer
        aiPendingCount:
          type: integer
        aiSkippedCount:
          type: integer
        gradeSubmitted:
          type: boolean
        pointA_grade:
          type: string
          enum: [A, B, C, D, F]
          nullable: true
        pointB_grade:
          type: string
          enum: [A, B, C, D, F]
          nullable: true

    SanitizeRequest:
      type: object
      properties:
        force:
          type: boolean

    SanitizationReportResponse:
      type: object
      properties:
        disbandedCount:
          type: integer
        autoRejectedRequestCount:
          type: integer
        triggeredAt:
          type: string
          format: date-time

    CoordinatorAdvisorActionRequest:
      type: object
      required: [action]
      description: For action=ASSIGN, advisorId is required. For action=REMOVE, advisorId is ignored.
      properties:
        action:
          type: string
          enum: [ASSIGN, REMOVE]
        advisorId:
          type: string
          format: uuid
          nullable: true
          description: Required when action=ASSIGN. Ignored when action=REMOVE.

    CoordinatorAdvisorActionResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        status:
          type: string
        advisorId:
          type: string
          format: uuid
          nullable: true

    # ── P5 — Red Team ─────────────────────────────────────────────────────────
    LlmConfigRequest:
      type: object
      required: [apiKey]
      properties:
        apiKey:
          type: string

    LlmConfigResponse:
      type: object
      properties:
        configured:
          type: boolean
        maskedKey:
          type: string
          nullable: true

    ActiveSprintResponse:
      type: object
      properties:
        sprintId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        storyPointTarget:
          type: integer
        daysRemaining:
          type: integer

    PerStudentSummaryResponse:
      type: object
      properties:
        assigneeGithubUsername:
          type: string
        completedPoints:
          type: integer
        aiValidationStatus:
          type: string
          enum: [PENDING, PASS, WARN, FAIL, SKIPPED]

    TrackingIssueResponse:
      type: object
      properties:
        issueKey:
          type: string
        assigneeGithubUsername:
          type: string
        storyPoints:
          type: integer
        prNumber:
          type: integer
        prMerged:
          type: boolean
        aiPrResult:
          type: string
          enum: [PENDING, PASS, WARN, FAIL, SKIPPED]
        aiDiffResult:
          type: string
          enum: [PENDING, PASS, WARN, FAIL, SKIPPED]

    SprintTrackingResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        sprintId:
          type: string
          format: uuid
        fetchedAt:
          type: string
          format: date-time
        issues:
          type: array
          items:
            $ref: '#/components/schemas/TrackingIssueResponse'
        perStudentSummary:
          type: array
          items:
            $ref: '#/components/schemas/PerStudentSummaryResponse'

    ScrumGradeRequest:
      type: object
      required: [pointA_grade, pointB_grade]
      properties:
        pointA_grade:
          type: string
          enum: [A, B, C, D, F]
        pointB_grade:
          type: string
          enum: [A, B, C, D, F]

    ScrumGradeResponse:
      type: object
      properties:
        gradeId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        sprintId:
          type: string
          format: uuid
        advisorId:
          type: string
          format: uuid
        gradedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        pointA_grade:
          type: string
          enum: [A, B, C, D, F]
        pointB_grade:
          type: string
          enum: [A, B, C, D, F]

    AdvisorGroupSprintSummaryResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        totalIssues:
          type: integer
        mergedPRs:
          type: integer
        aiPassCount:
          type: integer
        aiWarnCount:
          type: integer
        aiFailCount:
          type: integer
        aiPendingCount:
          type: integer
        aiSkippedCount:
          type: integer
        gradeSubmitted:
          type: boolean
        pointA_grade:
          type: string
          enum: [A, B, C, D, F]
          nullable: true
        pointB_grade:
          type: string
          enum: [A, B, C, D, F]
          nullable: true
        perStudentSummary:
          type: array
          items:
            $ref: '#/components/schemas/PerStudentSummaryResponse'

security:
  - bearerAuth: []

paths:

  /auth/login:
    post:
      summary: Login for professors, coordinators, and admins
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mail, password]
              properties:
                mail:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /auth/github:
    post:
      summary: Validate GitHub OAuth payload and issue JWT for students
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, studentId]
              properties:
                code:
                  type: string
                studentId:
                  type: string
                  pattern: '^[0-9]{11}$'
      responses:
        '200':
          description: Student validated, JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubLoginResponse'
        '400':
          description: Missing or malformed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Student ID not recognized or not on approved list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                message: "Student ID not recognized"

  /auth/reset-password:
    get:
      summary: Validate a one-time password reset token
      security: []
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
        '400':
          description: Token invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    post:
      summary: Redeem a reset token and set a new password
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password updated successfully
        '400':
          description: Token invalid/expired or password fails validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /admin/register-professor:
    post:
      summary: Register a new professor and return the reset token for initial password setup
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mail]
              properties:
                mail:
                  type: string
      responses:
        '201':
          description: Professor created
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetToken:
                    type: string
        '403':
          description: Caller is not an Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: Professor with same mail already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Server error during professor creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /admin/llm-config:
    get:
      summary: Get current LLM provider configuration
      tags: [Admin]
      responses:
        '200':
          description: LLM config returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmConfigResponse'
        '403':
          description: Caller is not an Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    put:
      summary: Set or update the LLM API key
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmConfigRequest'
      responses:
        '200':
          description: LLM config updated
        '400':
          description: Missing or blank apiKey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not an Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/students/upload:
    post:
      summary: Upload the list of eligible student IDs for the active term
      tags: [Coordinator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentIds]
              properties:
                studentIds:
                  type: array
                  items:
                    type: string
                    pattern: '^[0-9]{11}$'
      responses:
        '201':
          description: Students imported
        '400':
          description: Invalid studentId format, empty list, already uploaded id or duplicate IDs in the list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/sprints:
    get:
      summary: List all sprints
      tags: [Coordinator]
      responses:
        '200':
          description: Returns all sprints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sprint'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    post:
      summary: Create a new sprint
      tags: [Coordinator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startDate, endDate]
              properties:
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Sprint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sprint'
        '400':
          description: endDate is before startDate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/sprints/{id}/target:
    patch:
      summary: Set the per-student story point target for a sprint
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [storyPointTarget]
              properties:
                storyPointTarget:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Target updated
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /coordinator/sprints/{id}/deliverable-mapping:
    post:
      summary: Map a sprint to a deliverable with a contribution percentage
      tags: [Coordinator]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deliverableId, contributionPercentage]
              properties:
                deliverableId:
                  type: string
                  format: uuid
                contributionPercentage:
                  type: number
                  minimum: 0
                  maximum: 100
      responses:
        '201':
          description: Mapping created
        '400':
          description: Total contribution percentages for this deliverable exceed 100%
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
