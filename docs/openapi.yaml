openapi: 3.0.3
info:
  title: SPM API
  version: 1.0.0

paths:
  /api/auth/register-professor:
    post:
      summary: Register a professor account and trigger a password reset email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
      responses:
        "201":
          description: Professor created
        "400":
          description: Invalid input
        "409":
          description: Email already registered

  /api/auth/login:
    post:
      summary: Credentials login for professors, coordinators, and admins
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: JWT token and basic user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /api/auth/reset-password:
    get:
      summary: Validate a password reset token before showing the form
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token validity result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
        "400":
          description: Missing token
    post:
      summary: Redeem the reset token and set a new password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Operation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Invalid or expired token

  /api/auth/github/validate:
    post:
      summary: Validate a GitHub username against the pre-uploaded student ID list
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [githubUsername]
              properties:
                githubUsername:
                  type: string
      responses:
        "200":
          description: Whether the student is recognized
          content:
            application/json:
              schema:
                type: object
                properties:
                  recognized:
                    type: boolean
        "400":
          description: Missing username

  /api/auth/github/session:
    post:
      summary: Issue a session token for an authenticated GitHub student
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [githubUsername]
              properties:
                githubUsername:
                  type: string
      responses:
        "200":
          description: JWT token and basic user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: GitHub username not recognized

  /api/coordinator/student/upload:
    post:
      summary: Upload a list of recognized student IDs
      tags: [Coordinator]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentIds]
              properties:
                studentIds:
                  type: array
                  items:
                    type: string
                    minLength: 11
                    maxLength: 11
      responses:
        "200":
          description: Upload succeeded
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

components:
  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            role:
              type: string
              enum: [ADMIN, COORDINATOR, PROFESSOR, STUDENT]
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
