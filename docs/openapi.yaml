            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorAdvisorActionResponse'
        '400':
          description: ASSIGN — group is DISBANDED (no DISBANDED→ADVISOR_ASSIGNED transition); or group status is not TOOLS_BOUND or ADVISOR_ASSIGNED. REMOVE — group has no assigned advisor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Group or advisor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  # ── P5 — Red Team (student & advisor sprint tracking) ───────────────────────

  /sprints/active:
    get:
      tags: [Student]
      summary: Get the currently active sprint
      responses:
        '200':
          description: Active sprint returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSprintResponse'
        '404':
          description: No active sprint found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /groups/{groupId}/sprints/{sprintId}/tracking:
    get:
      tags: [Student]
      summary: Get sprint tracking data for the student's group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sprintId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tracking data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintTrackingResponse'
        '403':
          description: Caller is not a member of the group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Group or sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /advisor/sprints/active:
    get:
      tags: [Professor]
      summary: Get the currently active sprint (advisor view)
      responses:
        '200':
          description: Active sprint returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSprintResponse'
        '404':
          description: No active sprint found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /advisor/sprints/{sprintId}/groups:
    get:
      tags: [Professor]
      summary: List the advisor's groups with sprint summary stats
      parameters:
        - name: sprintId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: includeDisbanded
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Group summaries returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdvisorGroupSprintSummaryResponse'
        '404':
          description: Sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /advisor/sprints/{sprintId}/groups/{groupId}/tracking:
    get:
      tags: [Professor]
      summary: Get sprint tracking data for a specific group (advisor view)
      parameters:
        - name: sprintId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tracking data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintTrackingResponse'
        '403':
          description: Caller is not the advisor for this group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Group or sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /advisor/sprints/{sprintId}/groups/{groupId}/grade:
    get:
      tags: [Professor]
      summary: Get the submitted scrum grade for a group's sprint
      parameters:
        - name: sprintId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Grade returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrumGradeResponse'
        '403':
          description: Caller is not the advisor for this group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Grade not yet submitted, or group/sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    post:
      tags: [Professor]
      summary: Submit or update the scrum grade for a group's sprint
      parameters:
        - name: sprintId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrumGradeRequest'
      responses:
        '200':
          description: Grade saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrumGradeResponse'
        '400':
          description: Missing or invalid grade values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not the advisor for this group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Group or sprint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  # ── P4 — Blue Team ────────────────────────────────────────────────────────
  /committees:
    post:
      summary: Create a new committee for a specific term
      tags: [Committees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [committeeName, termId]
              properties:
                committeeName:
                  type: string
                termId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Committee created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: A committee with the same name already exists for this term
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    get:
      summary: List all committees, optionally filtered by term
      tags: [Committees]
      parameters:
        - name: termId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of committees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommitteeSummary'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}:
    get:
      summary: Get full details of a committee including professors and groups
      tags: [Committees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Committee detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitteeDetail'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}/professors:
    post:
      summary: Assign professors with ADVISOR or JURY roles to a committee
      tags: [Committees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [professors]
              properties:
                professors:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProfessorAssignment'
      responses:
        '200':
          description: Professors assigned
        '400':
          description: >
            Invalid professor IDs, scheduling conflict, or constraint violation
            (e.g. zero or multiple primary ADVISORs submitted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}/groups:
    post:
      summary: Batch-assign student groups to a committee
      tags: [Committees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupIds]
              properties:
                groupIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Groups assigned; each group is now eligible for Proposal submission
        '400':
          description: >
            A group has not completed Advisor Association (Process 3), is already
            assigned to another committee, or a group ID is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not a Coordinator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /professors/me/committees:
    get:
      summary: Get committees assigned to the authenticated professor
      tags: [Professors]
      responses:
        '200':
          description: List of committees the professor belongs to, with assigned groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfessorCommitteeSummary'
        '403':
          description: Caller is not a Professor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  # ── P6 — Blue Team Deliverable Submission & Review ────────────────────────────────────

  /deliverables:
    get:
      tags: [Student]
      summary: Get all active deliverables with submission status for the student's group
      responses:
        '200':
          description: List of deliverables with current submission status
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    type:
                      type: string
                      enum: [Proposal, SoW, Demonstration]
                    submissionDeadline:
                      type: string
                      format: date-time
                    reviewDeadline:
                      type: string
                      format: date-time
                    submissionStatus:
                      type: string
                      enum: [Not Submitted, Submitted, Graded]
        '403':
          description: Caller is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /deliverables/{deliverableId}/submissions:
    post:
      tags: [Student]
      summary: Submit a deliverable document (Markdown)
      parameters:
        - name: deliverableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Markdown content of the submission
      responses:
        '201':
          description: Submission created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId:
                    type: string
                    format: uuid
                  deliverableId:
                    type: string
                    format: uuid
                  groupId:
                    type: string
                    format: uuid
                  status:
                    type: string
                  submittedAt:
                    type: string
                    format: date-time
        '400':
          description: Submission deadline passed, group not assigned to committee, or invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not the Team Leader
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Deliverable not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /submissions/{submissionId}:
    get:
      tags: [Student, Professor]
      summary: Retrieve a submission document (read-only)
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Submission content retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId:
                    type: string
                    format: uuid
                  deliverableId:
                    type: string
                    format: uuid
                  groupId:
                    type: string
                    format: uuid
                  content:
                    type: string
                    description: Markdown content
                  submittedAt:
                    type: string
                    format: date-time
                  revisedAt:
                    type: string
                    format: date-time
                    nullable: true
        '403':
          description: Caller lacks permission to view this submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    put:
      tags: [Student]
      summary: Revise a submitted deliverable (before final deadline)
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Updated Markdown content
      responses:
        '200':
          description: Submission updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId:
                    type: string
                    format: uuid
                  status:
                    type: string
                  revisedAt:
                    type: string
                    format: date-time
        '400':
          description: Final grading deadline has passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not the Team Leader
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /submissions/{submissionId}/rubric-mappings:
    post:
      tags: [Student]
      summary: Link submission sections to rubric criteria
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mappings]
              properties:
                mappings:
                  type: array
                  items:
                    type: object
                    required: [criterionId, sectionReference]
                    properties:
                      criterionId:
                        type: string
                        format: uuid
                      sectionReference:
                        type: string
                        description: Text or position reference in markdown
      responses:
        '200':
          description: Rubric mappings saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId:
                    type: string
                    format: uuid
                  mappingCount:
                    type: integer
        '400':
          description: Invalid criterion IDs or submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Caller is not the Team Leader
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /submissions/{submissionId}/comments:
    post:
      tags: [Professor]
      summary: Add feedback comment to a submission (Committee members only)
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Comment text
                sectionReference:
                  type: string
                  nullable: true
                  description: Optional reference to specific section
      responses:
        '201':
          description: Comment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  commentId:
                    type: string
                    format: uuid
                  submissionId:
                    type: string
                    format: uuid
                  authorId:
                    type: string
                    format: uuid
                  content:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        '403':
          description: Caller is not an assigned committee member for this group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

    get:
      tags: [Student, Professor]
      summary: Retrieve comments on a submission
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Comments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    commentId:
                      type: string
                      format: uuid
                    submissionId:
                      type: string
                      format: uuid
                    authorId:
                      type: string
                      format: uuid
                    authorName:
                      type: string
                    content:
                      type: string
                    sectionReference:
                      type: string
                      nullable: true
                    createdAt:
                      type: string
                      format: date-time
        '403':
          description: Caller lacks permission to view these comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /committees/{id}/submissions:
    get:
      tags: [Professor]
      summary: Retrieve all submissions assigned to a committee for review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Committee submissions retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    submissionId:
                      type: string
                      format: uuid
                    deliverableId:
                      type: string
                      format: uuid
                    groupId:
                      type: string
                      format: uuid
                    groupName:
                      type: string
                    deliverableName:
                      type: string
                    submittedAt:
                      type: string
                      format: date-time
                    commentCount:
                      type: integer
        '403':
          description: Caller is not a member of this committee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Committee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
